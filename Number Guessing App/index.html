<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrapper">

  <!-- Left: Game Panel -->
  <div class="card">
    <h1>🎯 Guess the Number</h1>
    <p class="subtitle">I'm thinking of a number between 1 and 100</p>

    <div class="attempts-badge">Attempts: <span id="attempt-count">0</span> / 7</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="hint-box" id="hint">Make your first guess!</div>

    <input type="number" id="guess-input" min="1" max="100" placeholder="Enter a number (1–100)" />

    <button id="guess-btn" onclick="makeGuess()">Guess</button>
    <button id="restart-btn" onclick="restartGame()">🔄 New Game</button>
  </div>

  <!-- Right: History Panel -->
  <div class="history-panel">
    <h2>📋 Guess History</h2>
    <p class="history-subtitle">Your guesses will appear here</p>

    <div class="history-list" id="history-list">
      <div class="empty-state">No guesses yet. Start playing!</div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
